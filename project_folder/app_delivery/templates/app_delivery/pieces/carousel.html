{% load static %}



<div id="carouselBanners" class="carousel slide carousel-fade" data-bs-ride="carousel">
    
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#carouselBanners" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
        <button type="button" data-bs-target="#carouselBanners" data-bs-slide-to="1" aria-label="Slide 2"></button>
        <button type="button" data-bs-target="#carouselBanners" data-bs-slide-to="2" aria-label="Slide 3"></button>
    </div>

    <div class="carousel-inner">
        
        <div class="carousel-item active" data-bs-interval="5000">
            <a href="#"> <img src="{% static 'app_delivery\img\1.png'%}" class="d-block w-100 img-carousel" alt="Promoção Combo Família">
            </a>
        </div>

        <div class="carousel-item" data-bs-interval="5000">
            <a href="#">
                <img src="{% static 'app_delivery\img\2.png'%}" class="d-block w-100 img-carousel" alt="Promoção Terça em Dobro">
            </a>
        </div>

        <div class="carousel-item" data-bs-interval="5000">
            <a href="#">
                <img src="{% static 'app_delivery\img\3.png'%}" class="d-block w-100 img-carousel" alt="Frete Grátis">
            </a>
        </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselBanners" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Anterior</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselBanners" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Próximo</span>
    </button>
</div>

<div class="row"> 
    {% for pizza in pizzas %}
    <div class="col-md-4 mb-4">
        
        <div class="card pizza-card h-100 shadow-sm">
            <img src="{{ pizza.imagem }}" class="card-img-top" alt="{{ pizza.nome }}">
            
            <div class="card-body d-flex flex-column text-center p-4">
                <h5 class="card-title fw-bold mb-2" style="color: #e74c3c;">{{ pizza.nome }}</h5>
                
                <p class="card-text text-muted small flex-grow-1">{{ pizza.descricao }}</p>
                
                <div class="my-3">
                    <span class="text-dark small fw-bold">R$</span>
                    <span class="fs-3 fw-black text-danger d-inline-block">{{ pizza.preco|floatformat:2 }}</span>
                </div>
                
                <!-- <a href="#" class="btn btn-danger w-100 py-2 fw-bold text-uppercase tracking-wider">
                    Adicionar ao Carrinho
                </a> -->
            </div>
            
        </div>
        
    </div>
    {% endfor %}
</div>
